name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  test-and-migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: logonservice
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d logonservice"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/logonservice
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-access-secret-key-minimum-32-characters-long
      JWT_REFRESH_SECRET_KEY: ci-refresh-secret-key-minimum-32-characters
      TOTP_ENCRYPTION_KEY: ci-dedicated-totp-encryption-key
      ALLOWED_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_MINUTES: 1440
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAMESITE: strict
      ACCESS_COOKIE_NAME: access_token
      REFRESH_COOKIE_NAME: refresh_token
      CSRF_COOKIE_NAME: csrf_token
      CSRF_HEADER_NAME: X-CSRF-Token
      RATE_LIMIT_MAX_REQUESTS: 120
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_KEY_PREFIX: rl
      RISK_MEDIUM_SCORE_THRESHOLD: 40
      RISK_HIGH_SCORE_THRESHOLD: 70
      ALERT_EMAIL_TO: ""
      ALERT_WEBHOOK_URL: ""
      ALERT_WEBHOOK_TIMEOUT_SECONDS: 5
      ALERT_MIN_SEVERITY: medium
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM_EMAIL: noreply@logonservice.local
      SMTP_STARTTLS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migration smoke check
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q app/tests

  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and quality tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit pip-audit

      - name: Lint (Ruff)
        run: ruff check app --select F,E9

      - name: Type check (MyPy)
        continue-on-error: true
        run: mypy --ignore-missing-imports app

      - name: Security scan (Bandit)
        continue-on-error: true
        run: bandit -q -r app -ll

      - name: Dependency audit (pip-audit)
        continue-on-error: true
        run: pip-audit
