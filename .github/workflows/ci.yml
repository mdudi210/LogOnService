name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/logonservice
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-access-secret-key-minimum-32-characters
      JWT_REFRESH_SECRET_KEY: ci-refresh-secret-key-minimum-32-characters
      TOTP_ENCRYPTION_KEY: ci-totp-encryption-key-minimum-32-characters
      ALLOWED_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Docker availability
        run: docker info

      - name: Run test suite
        run: pytest -q app/tests

