services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: logonservice-frontend-dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped

  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    container_name: logonservice-frontend-prod
    ports:
      - "8080:80"
    restart: unless-stopped
    profiles:
      - prod

