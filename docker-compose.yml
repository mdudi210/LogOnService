services:
  db:
    image: postgres:16-alpine
    container_name: logonservice-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-logonservice}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-logonservice}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: logonservice-redis-main
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  email:
    image: axllent/mailpit:latest
    container_name: logonservice-email
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logonservice-web
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-logonservice}
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: email
      SMTP_PORT: 1025
      SMTP_STARTTLS: false
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-security@logonservices.local}
      SECURITY_ALERT_EMAIL: ${SECURITY_ALERT_EMAIL:-security@logonservices.local}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      email:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  postgres_data:
  redis_data:
